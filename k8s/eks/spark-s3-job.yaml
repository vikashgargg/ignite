# Spark 3.5.3 baseline for the P4 batch-on-S3 benchmark: runs the SAME scripts/batch_s3_bench.py
# (generate -> write Parquet to S3 -> read back + aggregate) in local[16] on the SAME node + S3 bucket
# as Zelox (run AFTER scaling Zelox to 0 = fair). Spark reaches s3:// via hadoop-aws (Hadoop 3.3.4
# matches Spark 3.5.3) using the node instance role (com.amazonaws...InstanceProfileCredentialsProvider).
# Requires ConfigMap 'batch-s3-script' (= scripts/batch_s3_bench.py) + env S3_PATH/N_ROWS at run time.
apiVersion: batch/v1
kind: Job
metadata: { name: spark-batch-s3, namespace: stream }
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector: { role: compute }
      containers:
        - name: spark
          image: python:3.12-slim-bookworm
          resources:
            requests: { cpu: "14", memory: "16Gi" }
            limits: { cpu: "16", memory: "28Gi" }
          env:
            # BENCH_REMOTE (not the magic SPARK_REMOTE) => classic local[16], not Connect mode.
            - { name: BENCH_REMOTE, value: "local[16]" }
            - { name: ENGINE, value: "spark" }
            - { name: S3_PATH, value: "__S3_PATH__" }
            - { name: N_ROWS, value: "__N_ROWS__" }
            - { name: SPARK_LOCAL_IP, value: "127.0.0.1" }
            - { name: AWS_REGION, value: "ap-south-1" }
            - name: PYSPARK_SUBMIT_ARGS
              value: >-
                --packages org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
                --conf spark.hadoop.fs.s3a.aws.credentials.provider=com.amazonaws.auth.InstanceProfileCredentialsProvider
                --conf spark.hadoop.fs.s3.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
                --driver-memory 20g --conf spark.sql.shuffle.partitions=32 pyspark-shell
          volumeMounts: [ { name: script, mountPath: /app } ]
          command:
            - /bin/sh
            - -c
            - |
              set -e
              apt-get update -qq && apt-get install -y -qq openjdk-17-jre-headless procps >/dev/null
              pip install --quiet "setuptools<81" "pyspark==3.5.3" pandas pyarrow  # setuptools<81 = distutils shim (py3.12)
              echo "=== Spark 3.5.3 batch-on-S3 (local[16]) -> $S3_PATH ==="
              # rewrite s3:// -> s3a:// for Spark's hadoop-aws
              S3_PATH="$(echo "$S3_PATH" | sed 's|^s3://|s3a://|')" python3 /app/batch_s3_bench.py || true
              cat /sys/fs/cgroup/memory.peak 2>/dev/null | awk '{printf "spark peak_RSS=%.1f GiB\n",$1/1073741824}'
      volumes:
        - name: script
          configMap: { name: batch-s3-script }
