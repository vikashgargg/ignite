apiVersion: v1
kind: Namespace
metadata:
  name: vajra
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vajra-spark-server
  namespace: vajra
  labels:
    app.kubernetes.io/name: vajra
    app.kubernetes.io/component: spark-server
spec:
  # We cannot have more than one replica because each Spark session is tied to a single pod.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vajra
      app.kubernetes.io/component: spark-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vajra
        app.kubernetes.io/component: spark-server
    spec:
      serviceAccountName: vajra-user
      volumes:
        - name: tmp-sail
          hostPath:
            path: /private/tmp/sail
            type: DirectoryOrCreate
        - name: tmp-sail-alt
          hostPath:
            path: /tmp/sail
            type: DirectoryOrCreate
      containers:
        - name: server
          image: vajra:latest
          command: [ "vajra" ]
          args: [ "server", "--ip", "0.0.0.0", "--port", "50051" ]
          ports:
            - containerPort: 50051
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: tmp-sail
              mountPath: /private/tmp/sail
            - name: tmp-sail-alt
              mountPath: /tmp/sail
          env:
            - name: RUST_LOG
              value: info
            - name: SAIL_MODE
              value: "kubernetes-cluster"
            - name: SAIL_CLUSTER__DRIVER_LISTEN_HOST
              value: "0.0.0.0"
            - name: SAIL_CLUSTER__DRIVER_EXTERNAL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SAIL_KUBERNETES__IMAGE
              value: vajra:latest
            - name: SAIL_KUBERNETES__NAMESPACE
              value: vajra
            - name: SAIL_KUBERNETES__DRIVER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SAIL_KUBERNETES__WORKER_SERVICE_ACCOUNT_NAME
              value: vajra-user
            - name: SAIL_KUBERNETES__WORKER_POD_TEMPLATE
              value: >-
                {"spec":{"volumes":[{"name":"tmp-sail","hostPath":{"path":"/private/tmp/sail","type":"DirectoryOrCreate"}},{"name":"tmp-sail-alt","hostPath":{"path":"/tmp/sail","type":"DirectoryOrCreate"}}],"containers":[{"name":"worker","volumeMounts":[{"name":"tmp-sail","mountPath":"/private/tmp/sail"},{"name":"tmp-sail-alt","mountPath":"/tmp/sail"}]}]}}
---
apiVersion: v1
kind: Service
metadata:
  name: vajra-spark-server
  namespace: vajra
  labels:
    app.kubernetes.io/name: vajra
    app.kubernetes.io/component: spark-server
spec:
  selector:
    app.kubernetes.io/name: vajra
    app.kubernetes.io/component: spark-server
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vajra-spark-server
  namespace: vajra
rules:
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "*" ]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vajra-user
  namespace: vajra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vajra-spark-server
  namespace: vajra
subjects:
  - kind: ServiceAccount
    name: vajra-user
    namespace: vajra
roleRef:
  kind: Role
  name: vajra-spark-server
  apiGroup: rbac.authorization.k8s.io
