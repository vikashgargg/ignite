apiVersion: v1
kind: Namespace
metadata:
  name: ignite
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ignite-spark-server
  namespace: ignite
  labels:
    app.kubernetes.io/name: ignite
    app.kubernetes.io/component: spark-server
spec:
  # We cannot have more than one replica because each Spark session is tied to a single pod.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ignite
      app.kubernetes.io/component: spark-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ignite
        app.kubernetes.io/component: spark-server
    spec:
      serviceAccountName: ignite-user
      containers:
        - name: server
          image: ignite:latest
          command: [ "ignite" ]
          args: [ "server", "--ip", "0.0.0.0", "--port", "50051" ]
          ports:
            - containerPort: 50051
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: info
            - name: SAIL_MODE
              value: "kubernetes-cluster"
            - name: SAIL_CLUSTER__DRIVER_LISTEN_HOST
              value: "0.0.0.0"
            - name: SAIL_CLUSTER__DRIVER_EXTERNAL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SAIL_KUBERNETES__IMAGE
              value: ignite:latest
            - name: SAIL_KUBERNETES__NAMESPACE
              value: ignite
            - name: SAIL_KUBERNETES__DRIVER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SAIL_KUBERNETES__WORKER_SERVICE_ACCOUNT_NAME
              value: ignite-user
---
apiVersion: v1
kind: Service
metadata:
  name: ignite-spark-server
  namespace: ignite
  labels:
    app.kubernetes.io/name: ignite
    app.kubernetes.io/component: spark-server
spec:
  selector:
    app.kubernetes.io/name: ignite
    app.kubernetes.io/component: spark-server
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ignite-spark-server
  namespace: ignite
rules:
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "*" ]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ignite-user
  namespace: ignite
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ignite-spark-server
  namespace: ignite
subjects:
  - kind: ServiceAccount
    name: ignite-user
    namespace: ignite
roleRef:
  kind: Role
  name: ignite-spark-server
  apiGroup: rbac.authorization.k8s.io
