# T2 tier (docs/design/three-tier-sdlc.md): a LOCAL, FREE Kubernetes cluster (kind = k8s in Docker) that
# mirrors the EKS streaming topology — a dedicated `role=kafka` node + a `role=compute` node — so the SAME
# manifests (kafka.yaml, vajra-stream.yaml, flink-session.yaml, jobs) and the SAME nodeSelectors deploy
# unchanged. This catches the Kubernetes-specific failures (pod scheduling, multi-pod CPU/mem contention,
# service networking, Kafka broker, Flink-SQL) that a local `--workers N` process CANNOT see and that every
# EKS surprise came from — WITHOUT the EKS cost. Resource REQUESTS are scaled down by the kind test overlay
# (a laptop is not a c7g.4xlarge); the point of T2 is topology/scheduling/networking correctness, not scale
# (that is T3/EKS). Apple Silicon: kind pulls arm64 node images automatically.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
    labels: { role: kafka }
  - role: worker
    labels: { role: compute }
