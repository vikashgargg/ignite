# Short-lived, cost-shaped EKS cluster for the Zelox-vs-Flink STREAMING head-to-head.
# Topology mirrors the published benchmark: a dedicated Kafka node (role=kafka) and
# a 16-vCPU compute node (role=compute) on which Flink and Zelox run SEQUENTIALLY
# (never concurrently) against the SAME shared Kafka topic — true like-for-like.
#
# Cost levers:
#   - Graviton (arm64) SPOT nodes (~70% cheaper; matches the arm64 ECR image)
#   - NAT gateway DISABLED + public-subnet nodes (saves ~$0.045/hr)
#   - Spot vCPU budget: 16 (c7g.4xlarge) + 8 (m7g.2xlarge) = 24 < 32 quota
#   - One CloudFormation stack -> `eksctl delete cluster` tears it ALL down.
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: zelox-stream-dist
  region: ap-south-1
  version: "1.31"

vpc:
  nat:
    gateway: Disable

managedNodeGroups:
  - name: compute
    amiFamily: AmazonLinux2023
    instanceTypes: ["c7g.2xlarge"]   # 8 vCPU x2 = distributed compute across 2 nodes
    spot: true
    desiredCapacity: 2
    minSize: 0
    maxSize: 2
    volumeSize: 80
    volumeType: gp3
    privateNetworking: false
    labels: { role: compute }
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess   # P1: streaming sink writes Parquet/Iceberg to S3
                                                       # (node instance role; Zelox object-store from_env)
  - name: kafka
    amiFamily: AmazonLinux2023
    instanceTypes: ["m7g.2xlarge"]   # 8 vCPU, 32 GB — dedicated Kafka broker
    spot: false                      # on-demand: dedicated broker must be reliable (spot capacity for
                                     # m7g.2xlarge was unfulfillable in ap-south-1c, 2026-06-30)
    desiredCapacity: 1
    minSize: 0
    maxSize: 1
    volumeSize: 80
    volumeType: gp3
    privateNetworking: false
    labels: { role: kafka }
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
