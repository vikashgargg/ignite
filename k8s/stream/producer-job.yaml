# Pre-load the SHARED Kafka topic `events` with N keyed, event-timed records.
# Both Flink and Vajra consume this identical topic from earliest — a true
# like-for-like windowed-aggregation workload. Payload (JSON):
#   key (Kafka msg key, = grouping key k)   value: {"k":int,"ts":epoch_ms,"v":1}
# event-time `ts` advances so the 10s tumbling windows are well-defined.
# Multiprocessing librdkafka producer -> ~1M msg/s, so 100M loads in a few min.
apiVersion: batch/v1
kind: Job
metadata:
  name: producer
  namespace: stream
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector: { role: compute }   # run on the idle 16-vCPU node; Kafka's 8-vCPU node can't also host the 6-CPU producer
      containers:
        - name: producer
          image: python:3.12-slim
          resources:
            requests: { cpu: "6", memory: "4Gi" }
            limits: { cpu: "12", memory: "8Gi" }
          env:
            - { name: BOOT, value: "kafka.stream.svc.cluster.local:9092" }
            - { name: TOPIC, value: "events" }
            - { name: N_EVENTS, value: "100000000" }   # 100M (Flink baseline scale)
            - { name: N_KEYS, value: "1000" }
            - { name: EVENTS_PER_MS, value: "1000" }    # event-time density -> window span
            - { name: N_PARTS, value: "16" }            # == topic partitions; one worker per partition
            - { name: PROCS, value: "16" }
          command:
            - /bin/sh
            - -c
            - |
              set -e
              pip install --quiet confluent-kafka
              python3 - <<'PY'
              import os, json, time, multiprocessing as mp
              from confluent_kafka import Producer
              BOOT=os.environ["BOOT"]; TOPIC=os.environ["TOPIC"]
              N=int(os.environ["N_EVENTS"]); K=int(os.environ["N_KEYS"])
              EPMS=int(os.environ["EVENTS_PER_MS"]); P=int(os.environ["PROCS"])
              NP=int(os.environ["N_PARTS"]); BASE=1700000000000
              # One worker per Kafka partition: worker `wid` owns partition `wid` and emits
              # its events (the strided slice i = wid, wid+NP, ...) in INCREASING event-time.
              # Because ts = BASE + i//EPMS is monotonic in i, each partition's offset order is
              # event-time-ordered -> a 0-second watermark drops nothing. This is the canonical
              # time-ordered keyed stream every windowed-agg benchmark (incl. Flink's) assumes;
              # routing by explicit partition (not key-hash) is what guarantees the ordering.
              def worker(wid):
                  p=Producer({"bootstrap.servers":BOOT,"linger.ms":50,
                              "batch.size":1048576,"compression.type":"lz4",
                              "queue.buffering.max.messages":2000000,
                              "queue.buffering.max.kbytes":1048576})
                  n=0
                  for i in range(wid, N, NP):
                      k=i % K
                      ts=BASE + (i // EPMS)
                      v=json.dumps({"k":k,"ts":ts,"v":1})
                      while True:
                          try:
                              p.produce(TOPIC, partition=wid, key=str(k), value=v); break
                          except BufferError:
                              p.poll(0.1)
                      n+=1
                      if (n & 0x3FFFF)==0: p.poll(0)
                  p.flush()
              t0=time.time()
              procs=[mp.Process(target=worker,args=(w,)) for w in range(P)]
              for pr in procs: pr.start()
              for pr in procs: pr.join()
              dt=time.time()-t0
              print(f"PRODUCED N={N} keys={K} parts={NP} in {dt:.1f}s = {N/dt/1e6:.2f}M msg/s", flush=True)
              PY
