# VAJ-BF2 T3: Vajra DISTRIBUTED (kubernetes-cluster) streaming for the multi-node beat vs Flink.
# The driver dynamically launches worker pods across the role=compute nodes; the windowed-agg's
# source + exchange + window distribute across them (T-BF2.2/2.5/2.3/2.6/2.7), with credit
# backpressure (T-BF2.4). Sink -> S3 (object store; the distributed-sink shared-storage requirement).
# `__ECR__` and `__BUCKET__` are sed-substituted by scripts/eks_dist_headtohead.sh.
apiVersion: apps/v1
kind: Deployment
metadata: { name: vajra-driver, namespace: stream, labels: { app: vajra-driver } }
spec:
  replicas: 1
  strategy: { rollingUpdate: { maxSurge: 0, maxUnavailable: 1 } }   # 8-vCPU node: no surge deadlock
  selector: { matchLabels: { app: vajra-driver } }
  template:
    metadata: { labels: { app: vajra-driver } }
    spec:
      serviceAccountName: vajra-user
      nodeSelector: { role: compute }
      containers:
        - name: server
          image: __ECR__/vajra:bf6
          command: [ "vajra" ]
          args: [ "server", "--ip", "0.0.0.0", "--port", "50051" ]
          ports: [ { containerPort: 50051 } ]
          imagePullPolicy: IfNotPresent
          resources: { requests: { cpu: "1", memory: "4Gi" }, limits: { cpu: "2", memory: "8Gi" } }
          env:
            - { name: RUST_LOG, value: "warn,sail_physical_plan::streaming::window_accum=info" }
            - { name: SAIL_MODE, value: "kubernetes-cluster" }
            - { name: VAJRA_DISTRIBUTED_STREAM, value: "1" }
            - { name: VAJRA_CREDIT_BACKPRESSURE, value: "16" }
            - { name: VAJRA_WM_PROF, value: "1" }
            - { name: SAIL_CLUSTER__DRIVER_LISTEN_HOST, value: "0.0.0.0" }
            - name: SAIL_CLUSTER__DRIVER_EXTERNAL_HOST
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - { name: SAIL_KUBERNETES__IMAGE, value: "__ECR__/vajra:bf6" }
            - { name: SAIL_KUBERNETES__NAMESPACE, value: "stream" }
            - name: SAIL_KUBERNETES__DRIVER_POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: SAIL_KUBERNETES__WORKER_SERVICE_ACCOUNT_NAME, value: "vajra-user" }
            # Worker pods: pinned to role=compute, ~3 vCPU each so 2 fit per 8-vCPU node => 4 workers
            # across the 2 compute nodes; the 8 window tasks even-spread 2-per-worker across nodes.
            - name: SAIL_KUBERNETES__WORKER_POD_TEMPLATE
              value: >-
                {"spec":{"nodeSelector":{"role":"compute"},"containers":[{"name":"worker","resources":{"requests":{"cpu":"3","memory":"4Gi"},"limits":{"cpu":"3","memory":"10Gi"}},"env":[{"name":"VAJRA_CREDIT_BACKPRESSURE","value":"16"},{"name":"VAJRA_WM_PROF","value":"1"},{"name":"VAJRA_COMPLETE_ON_END","value":"1"},{"name":"RUST_LOG","value":"warn,sail_physical_plan::streaming::window_accum=info"}]}]}}
---
apiVersion: v1
kind: Service
metadata: { name: vajra-driver, namespace: stream }
spec:
  selector: { app: vajra-driver }
  ports: [ { protocol: TCP, port: 50051, targetPort: 50051 } ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: vajra-driver, namespace: stream }
rules:
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "*" ]
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: vajra-user, namespace: stream }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: vajra-driver, namespace: stream }
subjects: [ { kind: ServiceAccount, name: vajra-user, namespace: stream } ]
roleRef: { kind: Role, name: vajra-driver, apiGroup: rbac.authorization.k8s.io }
