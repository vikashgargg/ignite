# Submits flink-sql.sql to the session cluster via sql-client and BLOCKS until
# the bounded INSERT finishes (table.dml-sync=true), printing wall time. The SQL
# is injected via a ConfigMap (created from k8s/stream/flink-sql.sql at run time).
# Runs on the kafka node (lightweight client; the work happens on the TM).
apiVersion: batch/v1
kind: Job
metadata: { name: flink-runner, namespace: stream }
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector: { role: kafka }
      initContainers:
        - name: seed-lib
          image: flink:1.19.1-scala_2.12-java17
          command: ["/bin/sh","-c"]
          args:
            - |
              cp -a /opt/flink/lib/. /flinklib/
              curl -fsSL -o /flinklib/flink-sql-connector-kafka-3.2.0-1.19.jar \
                https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/3.2.0-1.19/flink-sql-connector-kafka-3.2.0-1.19.jar
          volumeMounts: [ { name: flinklib, mountPath: /flinklib } ]
      containers:
        - name: sql
          image: flink:1.19.1-scala_2.12-java17
          envFrom: [ { configMapRef: { name: flink-config } } ]
          command: ["/bin/sh","-c"]
          args:
            - |
              set -e
              CONF=/opt/flink/conf/flink-conf.yaml
              {
                echo "jobmanager.rpc.address: flink-jm.stream.svc.cluster.local"
                echo "rest.address: flink-jm.stream.svc.cluster.local"
                echo "rest.port: 8081"
                echo "execution.target: remote"
              } >> $CONF
              echo "=== Flink SQL windowed-agg (bounded backlog) ==="
              T0=$(date +%s%N)
              /opt/flink/bin/sql-client.sh -f /sql/flink-sql.sql
              T1=$(date +%s%N)
              awk "BEGIN{printf \"FLINK_WAGG wall_s=%.2f\\n\", ($T1-$T0)/1000000000}"
          volumeMounts:
            - { name: flinklib, mountPath: /opt/flink/lib }
            - { name: sql, mountPath: /sql }
      volumes:
        - { name: flinklib, emptyDir: {} }
        - { name: sql, configMap: { name: flink-sql } }
