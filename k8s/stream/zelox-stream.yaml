# Zelox for the streaming head-to-head. Runs on the SAME role=compute c7g.4xlarge
# the Flink TaskManager used (run sequentially, never concurrently), local-cluster
# with 4 workers across the 16 vCPU — same hardware, same shared Kafka topic.
# __ECR__ is substituted at deploy time with the account ECR host.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zelox-stream
  namespace: stream
spec:
  replicas: 1
  selector: { matchLabels: { app: zelox-stream } }
  template:
    metadata: { labels: { app: zelox-stream } }
    spec:
      nodeSelector: { role: compute }
      containers:
        - name: server
          image: __ECR__/zelox:t7jp
          args: ["server", "--ip", "0.0.0.0", "--port", "50051", "--mode", "local-cluster", "--workers", "4"]
          ports: [ { containerPort: 50051 } ]
          resources:
            requests: { cpu: "15", memory: "24Gi" }
            limits: { cpu: "16", memory: "28Gi" }
          env:
            - { name: RUST_LOG, value: warn }
            - { name: ZELOX_RUNTIME__STACK_SIZE, value: "16777216" }
            # Object-store region (the ap-south-1 bucket 301-redirects if the client defaults us-east-1).
            - { name: AWS_REGION, value: ap-south-1 }
            - { name: AWS_DEFAULT_REGION, value: ap-south-1 }
            # jemalloc decay: return freed pages to the OS (bound RSS like Flink/RocksDB). Prof is OFF
            # here (clean throughput run); flip ON for the memory run via `kubectl set env` with
            # _RJEM_MALLOC_CONF=prof:true,prof_active:true,lg_prof_sample:19,lg_prof_interval:32,prof_prefix:/tmp/jeprof,...
            - { name: _RJEM_MALLOC_CONF, value: "dirty_decay_ms:1000,muzzy_decay_ms:1000" }
            - { name: MALLOC_CONF, value: "dirty_decay_ms:1000,muzzy_decay_ms:1000" }
            # Streaming-memory fix = bound librdkafka's prefetch queue (the C-side driver of the EKS
            # 1.20x-vs-Flink RSS gap). ZELOX_KAFKA_PREFETCH_KBYTES is set per-run by the prefetch sweep;
            # code default 256 MiB/partition. docs/design/streaming-memory-boundedness.md
            # Throughput pinpoint: dumps the per-stage breakdown (source_read/from_json/exchange/encode/
            # finalize) to this pod's log at the windowed-agg EndOfData — grep `WM_PROF`. Per-batch
            # overhead only (negligible). Remove for the pure throughput A/B if you want zero overhead.
            - { name: ZELOX_WM_PROF, value: "1" }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          emptyDir: { sizeLimit: 50Gi }
---
apiVersion: v1
kind: Service
metadata: { name: zelox-stream, namespace: stream }
spec:
  selector: { app: zelox-stream }
  ports: [ { port: 50051, targetPort: 50051 } ]
