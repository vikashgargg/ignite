# Flink 1.19 session with S3 PARQUET sink (fair like-for-like vs Vajra, which writes parquet to S3).
# Adds: (1) S3 plugin via ENABLE_BUILT_IN_PLUGINS (flink-s3-fs-hadoop, uses node instance role creds);
# (2) flink-sql-parquet format jar in /opt/flink/lib; (3) checkpointing (filesystem sink commits on ckpt).
# TM on role=compute (has S3 access); JM on role=kafka.
apiVersion: v1
kind: ConfigMap
metadata: { name: flink-config, namespace: stream }
data:
  ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-1.19.1.jar
  FLINK_PROPERTIES: |
    jobmanager.rpc.address: flink-jm.stream.svc.cluster.local
    taskmanager.numberOfTaskSlots: 16
    parallelism.default: 16
    jobmanager.memory.process.size: 2048m
    taskmanager.memory.process.size: 24576m
    taskmanager.memory.managed.fraction: 0.5
    rest.address: flink-jm.stream.svc.cluster.local
    rest.bind-address: 0.0.0.0
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: flink-jm, namespace: stream }
spec:
  replicas: 1
  selector: { matchLabels: { app: flink, component: jm } }
  template:
    metadata: { labels: { app: flink, component: jm } }
    spec:
      nodeSelector: { role: kafka }
      initContainers:
        - name: seed-lib
          image: flink:1.19.1-scala_2.12-java17
          command: ["/bin/sh","-c"]
          args:
            - |
              cp -a /opt/flink/lib/. /flinklib/
              curl -fsSL -o /flinklib/flink-sql-connector-kafka-3.2.0-1.19.jar https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/3.2.0-1.19/flink-sql-connector-kafka-3.2.0-1.19.jar
              curl -fsSL -o /flinklib/flink-sql-parquet-1.19.1.jar https://repo1.maven.org/maven2/org/apache/flink/flink-sql-parquet/1.19.1/flink-sql-parquet-1.19.1.jar
              curl -fsSL -o /flinklib/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar https://repo1.maven.org/maven2/org/apache/flink/flink-shaded-hadoop-2-uber/2.8.3-10.0/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar
              ls -la /flinklib | tail -6
          volumeMounts: [ { name: flinklib, mountPath: /flinklib } ]
      containers:
        - name: jobmanager
          image: flink:1.19.1-scala_2.12-java17
          args: ["jobmanager"]
          ports: [ {containerPort: 6123}, {containerPort: 8081} ]
          envFrom: [ { configMapRef: { name: flink-config } } ]
          resources: { requests: {cpu: "1", memory: "2Gi"}, limits: {cpu: "2", memory: "3Gi"} }
          volumeMounts: [ { name: flinklib, mountPath: /opt/flink/lib } ]
      volumes: [ { name: flinklib, emptyDir: {} } ]
---
apiVersion: v1
kind: Service
metadata: { name: flink-jm, namespace: stream }
spec:
  selector: { app: flink, component: jm }
  ports: [ {name: rpc, port: 6123}, {name: blob, port: 6124}, {name: rest, port: 8081} ]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: flink-tm, namespace: stream }
spec:
  replicas: 1
  selector: { matchLabels: { app: flink, component: tm } }
  template:
    metadata: { labels: { app: flink, component: tm } }
    spec:
      nodeSelector: { role: compute }
      initContainers:
        - name: seed-lib
          image: flink:1.19.1-scala_2.12-java17
          command: ["/bin/sh","-c"]
          args:
            - |
              cp -a /opt/flink/lib/. /flinklib/
              curl -fsSL -o /flinklib/flink-sql-connector-kafka-3.2.0-1.19.jar https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/3.2.0-1.19/flink-sql-connector-kafka-3.2.0-1.19.jar
              curl -fsSL -o /flinklib/flink-sql-parquet-1.19.1.jar https://repo1.maven.org/maven2/org/apache/flink/flink-sql-parquet/1.19.1/flink-sql-parquet-1.19.1.jar
              curl -fsSL -o /flinklib/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar https://repo1.maven.org/maven2/org/apache/flink/flink-shaded-hadoop-2-uber/2.8.3-10.0/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar
          volumeMounts: [ { name: flinklib, mountPath: /flinklib } ]
      containers:
        - name: taskmanager
          image: flink:1.19.1-scala_2.12-java17
          args: ["taskmanager"]
          envFrom: [ { configMapRef: { name: flink-config } } ]
          resources: { requests: {cpu: "15", memory: "26Gi"}, limits: {cpu: "16", memory: "28Gi"} }
          volumeMounts: [ { name: flinklib, mountPath: /opt/flink/lib } ]
      volumes: [ { name: flinklib, emptyDir: {} } ]
