# Long-lived Spark-Connect client pod for driving Zelox's streaming runs.
# The zelox:eks server image ships pyspark but NOT grpcio (the Connect *client*
# stack), so we run the client from a clean python pod, pip-install the matching
# Spark Connect client, kubectl-cp the harness scripts in, and exec the runs.
# Sits on the kafka node so it never competes with Zelox for the 16 compute vCPU.
apiVersion: v1
kind: Pod
metadata:
  name: zelox-client
  namespace: stream
spec:
  restartPolicy: Never
  nodeSelector: { role: kafka }
  containers:
    - name: client
      image: python:3.12-slim
      command: ["/bin/sh", "-c"]
      args:
        - |
          pip install --quiet "setuptools<81" pyspark-client==4.2.0 grpcio grpcio-status protobuf googleapis-common-protos pandas pyarrow confluent-kafka boto3
          echo CLIENT_READY
          sleep infinity
      resources:
        requests: { cpu: "250m", memory: "2Gi" }   # lightweight gRPC client; must co-exist with flink-jm (1 CPU) on the 8-vCPU kafka node
        limits: { cpu: "2", memory: "4Gi" }
