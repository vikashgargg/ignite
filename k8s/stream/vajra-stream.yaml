# Vajra for the streaming head-to-head. Runs on the SAME role=compute c7g.4xlarge
# the Flink TaskManager used (run sequentially, never concurrently), local-cluster
# with 4 workers across the 16 vCPU — same hardware, same shared Kafka topic.
# __ECR__ is substituted at deploy time with the account ECR host.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vajra-stream
  namespace: stream
spec:
  replicas: 1
  selector: { matchLabels: { app: vajra-stream } }
  template:
    metadata: { labels: { app: vajra-stream } }
    spec:
      nodeSelector: { role: compute }
      containers:
        - name: server
          image: __ECR__/vajra:wmprof
          args: ["server", "--ip", "0.0.0.0", "--port", "50051", "--mode", "local-cluster", "--workers", "4"]
          ports: [ { containerPort: 50051 } ]
          resources:
            requests: { cpu: "15", memory: "24Gi" }
            limits: { cpu: "16", memory: "28Gi" }
          env:
            - { name: RUST_LOG, value: warn }
            - { name: SAIL_RUNTIME__STACK_SIZE, value: "16777216" }
            # jemalloc return-to-OS decay (bounds RSS = the streaming memory fix). 1s decay purges freed
            # Arrow batch pages back to the OS so peak RSS ~ live memory. tikv-jemalloc reads the
            # `_RJEM_MALLOC_CONF`-prefixed env; also set MALLOC_CONF in case of an unprefixed build.
            # Bounded in-flight buffers = the streaming-RSS fix (measured: exchange cap 16->2 = -11.5%
            # RSS, zero throughput cost). Tighter exchange backpressure + smaller source batches bound the
            # live in-flight memory (the EKS 1.20x-vs-Flink gap). docs/design/streaming-memory-boundedness.md
            - { name: VAJRA_EXCHANGE_CHANNEL_CAP, value: "4" }
            - { name: VAJRA_SOURCE_MAX_BATCH_BYTES, value: "33554432" }  # 32 MiB (was 128)
            # Throughput pinpoint: dumps the per-stage breakdown (source_read/from_json/exchange/encode/
            # finalize) to this pod's log at the windowed-agg EndOfData — grep `WM_PROF`. Per-batch
            # overhead only (negligible). Remove for the pure throughput A/B if you want zero overhead.
            - { name: VAJRA_WM_PROF, value: "1" }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          emptyDir: { sizeLimit: 50Gi }
---
apiVersion: v1
kind: Service
metadata: { name: vajra-stream, namespace: stream }
spec:
  selector: { app: vajra-stream }
  ports: [ { port: 50051, targetPort: 50051 } ]
