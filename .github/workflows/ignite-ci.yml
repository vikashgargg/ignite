name: Ignite CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # NOTE: PYO3_CROSS_PYTHON_VERSION must NOT be set workflow-wide. It forces
  # PyO3 into cross mode and emits -lpython3.11 for every NATIVE cargo build,
  # which then fails ("unable to find -lpython3.11"). It is set per-job only on
  # the genuine cross-compile (build-linux musl via zigbuild).

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: sudo apt-get install -y protobuf-compiler libssl-dev libcurl4-openssl-dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: sudo apt-get install -y protobuf-compiler libssl-dev libcurl4-openssl-dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        # PyO3 embedding build+run needs the interpreter pinned and its lib dir
        # on the link/runtime path (the binaries link libpython3 via abi3).
        env:
          PYO3_PYTHON: ${{ env.pythonLocation }}/bin/python
          RUSTFLAGS: "-L native=${{ env.pythonLocation }}/lib"
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
        run: cargo test --workspace --lib -- --test-threads=4

  build-linux:
    name: Build Linux binaries (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-musl
            artifact: vajra-linux-x86_64
          - arch: aarch64
            target: aarch64-unknown-linux-musl
            artifact: vajra-linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get install -y protobuf-compiler musl-tools libssl-dev libcurl4-openssl-dev
          pip install cargo-zigbuild 2>/dev/null || cargo install cargo-zigbuild
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.14.0"
      - name: Build static binary (musl via zigbuild)
        env:
          # Genuine cross-compile: PyO3 needs the target Python version hint here.
          PYO3_CROSS_PYTHON_VERSION: "3.11"
        run: cargo zigbuild --release -p sail-cli --target ${{ matrix.target }}
      - name: Show binary size
        run: |
          ls -lh target/${{ matrix.target }}/release/vajra
          file target/${{ matrix.target }}/release/vajra
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/vajra
          retention-days: 7

  distributed-scorecard:
    name: Distributed scorecard (local-cluster)
    runs-on: ubuntu-latest
    # Only run on PRs targeting main and on pushes to main/phase* to keep CI cost down.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      # Python 3.12 must match the container Dockerfile (ARG PYTHON_VERSION=3.12)
      # so that PySpark UDF pickling works end-to-end against the local-cluster server.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-distributed-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system deps
        run: sudo apt-get install -y protobuf-compiler libssl-dev libcurl4-openssl-dev

      - name: Build release binary
        env:
          PYO3_PYTHON: ${{ env.pythonLocation }}/bin/python
          RUSTFLAGS: "-L native=${{ env.pythonLocation }}/lib"
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
        run: cargo build --release -p sail-cli

      - name: Set up smoke venv
        run: |
          python3.12 -m venv .venvs/smoke
          .venvs/smoke/bin/pip install --quiet "pyspark[connect]==4.0.0" setuptools

      - name: Start vajra in local-cluster mode
        env:
          SAIL_MODE: local-cluster
          RUST_LOG: warn
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
        run: |
          mkdir -p /tmp/vajra
          target/release/vajra server --ip 0.0.0.0 --port 50051 &
          echo "VAJRA_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Spark Connect to be ready
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 50051 2>/dev/null; then
              echo "Vajra ready after ${i}s"
              break
            fi
            sleep 1
          done
          nc -z localhost 50051 || { echo "Vajra did not start in 30s"; exit 1; }

      - name: Run Spark compat scorecard
        env:
          SPARK_REMOTE: sc://localhost:50051
          PYTHONPATH: .venvs/smoke/lib/python3.12/site-packages
        run: |
          mkdir -p /tmp/vajra
          python3.12 scripts/spark_compat_score.py 2>&1 | tee scorecard.log || true

      - name: Run streaming integration tests
        env:
          SPARK_REMOTE: sc://localhost:50051
          PYTHONPATH: .venvs/smoke/lib/python3.12/site-packages
        run: |
          python3.12 scripts/test_streaming.py 2>&1 | tee streaming.log
          # streaming test exits 1 on failure — propagate the exit code
          python3.12 scripts/test_streaming.py

      - name: Enforce minimum pass rate
        run: |
          # Scorecard prints: "  Total:  N passed, N failed, N skipped"
          PASSED=$(grep -oE '[0-9]+ passed' scorecard.log | grep -oE '[0-9]+' | head -1 || echo 0)
          FAILED=$(grep -oE '[0-9]+ failed' scorecard.log | grep -oE '[0-9]+' | head -1 || echo 99)
          TOTAL=$(( PASSED + FAILED ))
          echo "Scorecard result: ${PASSED}/${TOTAL}"
          # Require at least 100/105 to pass CI
          [ "${PASSED}" -ge 100 ] || { echo "FAIL: only ${PASSED}/${TOTAL} passed (need ≥100)"; exit 1; }

      - name: Upload scorecard log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-distributed
          path: |
            scorecard.log
            streaming.log
          retention-days: 7

      - name: Stop vajra
        if: always()
        run: kill "$VAJRA_PID" 2>/dev/null || true

  differential-spark:
    name: Differential test vs Apache Spark
    runs-on: ubuntu-latest
    # The trust gate: every change is diffed byte-for-byte against REAL Apache
    # Spark on the common path. Fails the build on any divergence.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      # Java for the reference engine (real Apache Spark 3.5, JVM).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-diff-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system deps
        run: sudo apt-get install -y protobuf-compiler libssl-dev libcurl4-openssl-dev netcat-openbsd

      - name: Build release binary
        # Pin PyO3 to the exact setup-python interpreter and put its lib dir on
        # the linker path. `python3.12` is not a command on the runner, so the
        # generic env var fell back to a system python whose lib was unfindable
        # (-lpython3.11 not found). ${pythonLocation} is exported by setup-python.
        env:
          PYO3_PYTHON: ${{ env.pythonLocation }}/bin/python
          RUSTFLAGS: "-L native=${{ env.pythonLocation }}/lib"
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
          CARGO_PROFILE_RELEASE_LTO: thin
        run: cargo build --release -p sail-cli

      - name: Set up reference venv (Apache Spark 3.5, JVM)
        run: |
          python3.12 -m venv .venvs/spark-ref
          .venvs/spark-ref/bin/pip install --quiet "pyspark==3.5.3" pandas

      - name: Set up candidate venv (pyspark Spark Connect)
        run: |
          python3.12 -m venv .venvs/smoke
          .venvs/smoke/bin/pip install --quiet "pyspark[connect]==4.0.0" setuptools

      - name: Run reference (real Apache Spark)
        working-directory: scripts/diff_test
        run: ENGINE=reference ../../.venvs/spark-ref/bin/python run_engine.py /tmp/ref.json

      - name: Start vajra (Spark Connect server)
        env:
          RUST_LOG: warn
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
        run: |
          PYTHONPATH=.venvs/smoke/lib/python3.12/site-packages \
            target/release/vajra server --ip 0.0.0.0 --port 50051 &
          echo "VAJRA_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do nc -z localhost 50051 && break; sleep 1; done
          nc -z localhost 50051 || { echo "vajra did not start"; exit 1; }

      - name: Run candidate (Vajra)
        working-directory: scripts/diff_test
        run: ENGINE=candidate SPARK_REMOTE=sc://localhost:50051 ../../.venvs/smoke/bin/python run_engine.py /tmp/cand.json

      - name: Diff vs Apache Spark (fails on any divergence)
        working-directory: scripts/diff_test
        run: ../../.venvs/smoke/bin/python diff.py /tmp/ref.json /tmp/cand.json

      - name: Stop vajra
        if: always()
        run: kill "$VAJRA_PID" 2>/dev/null || true

  k8s-scorecard:
    name: K8s scorecard (kubernetes-cluster / kind)
    runs-on: ubuntu-latest
    # Only run on PRs targeting main and on pushes to main/phase* to keep CI cost down.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-k8s-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system deps
        run: |
          sudo apt-get install -y protobuf-compiler netcat-openbsd libssl-dev libcurl4-openssl-dev

      - name: Install kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -Lo kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl

      - name: Build Docker image
        env:
          PYO3_PYTHON: python3.12
        run: docker build -t vajra:latest -f docker/Dockerfile .

      - name: Set up smoke venv
        run: |
          python3.12 -m venv .venvs/smoke
          .venvs/smoke/bin/pip install --quiet "pyspark[connect]==4.0.0" setuptools

      - name: Prepare shared scratch directories
        run: mkdir -p /tmp/vajra /tmp/sail /private/tmp/sail

      - name: Create kind cluster
        run: |
          kind create cluster --name vajra-ci --config k8s/kind-config.yaml
          kind load docker-image vajra:latest --name vajra-ci

      - name: Apply k8s manifests
        run: kubectl apply -f k8s/sail.yaml

      - name: Wait for deployment rollout
        run: kubectl rollout status deployment/vajra-spark-server -n vajra --timeout=180s

      - name: Port-forward Spark Connect
        run: |
          kubectl port-forward -n vajra svc/vajra-spark-server 50051:50051 &
          echo "PF_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            nc -z localhost 50051 2>/dev/null && break
            sleep 2
          done
          nc -z localhost 50051 || { echo "Port-forward not ready"; exit 1; }

      - name: Run Spark compat scorecard (kubernetes-cluster)
        env:
          SPARK_REMOTE: sc://localhost:50051
          PYTHONPATH: .venvs/smoke/lib/python3.12/site-packages
        run: |
          .venvs/smoke/bin/python scripts/spark_compat_score.py 2>&1 | tee k8s-scorecard.log || true

      - name: Run streaming integration tests (kubernetes-cluster)
        env:
          SPARK_REMOTE: sc://localhost:50051
          PYTHONPATH: .venvs/smoke/lib/python3.12/site-packages
        run: .venvs/smoke/bin/python scripts/test_streaming.py 2>&1 | tee k8s-streaming.log

      - name: Enforce minimum pass rate
        run: |
          PASSED=$(grep -oE '[0-9]+ passed' k8s-scorecard.log | grep -oE '[0-9]+' | head -1 || echo 0)
          FAILED=$(grep -oE '[0-9]+ failed' k8s-scorecard.log | grep -oE '[0-9]+' | head -1 || echo 99)
          TOTAL=$(( PASSED + FAILED ))
          echo "K8s scorecard: ${PASSED}/${TOTAL}"
          [ "${PASSED}" -ge 100 ] || { echo "FAIL: only ${PASSED}/${TOTAL} passed (need ≥100)"; exit 1; }

      - name: Upload scorecard log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-scorecard
          path: |
            k8s-scorecard.log
            k8s-streaming.log
          retention-days: 7

      - name: Tear down kind cluster
        if: always()
        run: |
          kill "$PF_PID" 2>/dev/null || true
          kind delete cluster --name vajra-ci 2>/dev/null || true

  macos-scorecard:
    name: macOS scorecard (Apple Silicon native)
    runs-on: macos-15
    # Only run on PRs targeting main and on pushes to main/phase* to keep CI cost down.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-scorecard-py312-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system deps
        run: brew install protobuf

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release binary (Apple Silicon)
        env:
          PYO3_PYTHON: python3.12
        run: cargo build --release -p sail-cli

      - name: Set up smoke venv
        run: |
          python3.12 -m venv .venvs/smoke
          .venvs/smoke/bin/pip install --quiet "pyspark[connect]==4.0.0" setuptools

      - name: Start vajra in local-cluster mode
        env:
          SAIL_MODE: local-cluster
          RUST_LOG: warn
        run: |
          mkdir -p /tmp/vajra
          target/release/vajra server --ip 0.0.0.0 --port 50051 &
          echo "VAJRA_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Spark Connect to be ready
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 50051 2>/dev/null; then
              echo "Vajra ready after ${i}s"
              break
            fi
            sleep 1
          done
          nc -z localhost 50051 || { echo "Vajra did not start in 30s"; exit 1; }

      - name: Run Spark compat scorecard (macOS)
        env:
          SPARK_REMOTE: sc://localhost:50051
          PYTHONPATH: .venvs/smoke/lib/python3.12/site-packages
        run: |
          python3.12 scripts/spark_compat_score.py 2>&1 | tee macos-scorecard.log || true

      - name: Run streaming integration tests (macOS)
        env:
          SPARK_REMOTE: sc://localhost:50051
          PYTHONPATH: .venvs/smoke/lib/python3.12/site-packages
        run: python3.12 scripts/test_streaming.py 2>&1 | tee macos-streaming.log

      - name: Enforce minimum pass rate
        run: |
          PASSED=$(grep -oE '[0-9]+ passed' macos-scorecard.log | grep -oE '[0-9]+' | head -1 || echo 0)
          FAILED=$(grep -oE '[0-9]+ failed' macos-scorecard.log | grep -oE '[0-9]+' | head -1 || echo 99)
          TOTAL=$(( PASSED + FAILED ))
          echo "macOS scorecard: ${PASSED}/${TOTAL}"
          [ "${PASSED}" -ge 100 ] || { echo "FAIL: only ${PASSED}/${TOTAL} passed (need ≥100)"; exit 1; }

      - name: Upload scorecard log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-scorecard
          path: |
            macos-scorecard.log
            macos-streaming.log
          retention-days: 7

      - name: Stop vajra
        if: always()
        run: kill "$VAJRA_PID" 2>/dev/null || true

  tpch-sf1:
    name: TPC-H SF-1 (22 queries)
    runs-on: ubuntu-latest
    # Run on PRs to main and on pushes to main/phase* branches.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tpch-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system deps
        run: sudo apt-get install -y protobuf-compiler libssl-dev libcurl4-openssl-dev

      - name: Build release binary
        env:
          PYO3_PYTHON: ${{ env.pythonLocation }}/bin/python
          RUSTFLAGS: "-L native=${{ env.pythonLocation }}/lib"
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
        run: cargo build --release -p sail-cli

      - name: Set up Python venv
        run: |
          python3.12 -m venv .venvs/smoke
          .venvs/smoke/bin/pip install --quiet "pyspark[connect]==4.0.0" duckdb pandas pyarrow setuptools

      - name: Start vajra in local-cluster mode
        env:
          SAIL_MODE: local-cluster
          RUST_LOG: warn
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
        run: |
          mkdir -p /tmp/tpch_data
          target/release/vajra server --ip 0.0.0.0 --port 50051 &
          echo "VAJRA_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Vajra to be ready
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 50051 2>/dev/null; then
              echo "Vajra ready after ${i}s"
              break
            fi
            sleep 1
          done
          nc -z localhost 50051 || { echo "Vajra did not start in 30s"; exit 1; }

      - name: Run TPC-H SF-1 benchmark (all 22 queries)
        env:
          SPARK_REMOTE: sc://localhost:50051
          PYTHONPATH: .venvs/smoke/lib/python3.12/site-packages
          TPCH_SF: "1"
          TPCH_DATA_DIR: /tmp/tpch_data
          TPCH_PASS_THRESHOLD: "22"
        run: |
          python3.12 scripts/tpch_distributed.py 2>&1 | tee tpch.log
          python3.12 scripts/tpch_distributed.py

      - name: Upload TPC-H log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tpch-sf1-results
          path: |
            tpch.log
            /tmp/tpch_data/benchmark_result.json
          retention-days: 14

      - name: Stop vajra
        if: always()
        run: kill "$VAJRA_PID" 2>/dev/null || true

  build-macos-arm64:
    name: Build macOS binary (Apple Silicon only)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-arm64-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: brew install protobuf
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build aarch64-apple-darwin
        env:
          PYO3_PYTHON: python3.12
        run: cargo build --release -p sail-cli
      - name: Show binary size
        run: ls -lh target/release/vajra
      - uses: actions/upload-artifact@v4
        with:
          name: vajra-aarch64-apple-darwin-ci
          path: target/release/vajra
          retention-days: 7
