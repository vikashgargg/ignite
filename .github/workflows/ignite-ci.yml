name: Ignite CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: sudo apt-get install -y protobuf-compiler
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: sudo apt-get install -y protobuf-compiler
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: cargo test --workspace --lib -- --test-threads=4

  build-binary:
    name: Build ignite binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: sudo apt-get install -y protobuf-compiler musl-tools
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build static binary
        run: cargo build --release -p sail-cli --target x86_64-unknown-linux-musl
      - name: Show binary size
        run: |
          ls -lh target/x86_64-unknown-linux-musl/release/ignite
          file target/x86_64-unknown-linux-musl/release/ignite
      - uses: actions/upload-artifact@v4
        with:
          name: ignite-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/ignite
          retention-days: 7
