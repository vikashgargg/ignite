name: Release Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # PYO3_CROSS_PYTHON_VERSION is set per-job on the Linux cross-build only.
  # The macOS job is a native arm64 build and must NOT see it (else PyO3
  # enters cross mode and links the wrong Python).

jobs:
  # Standalone Linux binary: NATIVE glibc x86_64 build. librdkafka (Kafka
  # source) builds cleanly natively — the musl static target is dropped because
  # musl has no target libcurl, so librdkafka cannot cross-compile to it.
  # For aarch64 Linux and full production deployment, use the container image
  # (docker/Dockerfile, glibc, both arches) — that is the production artifact.
  build-linux:
    name: Build Linux (x86_64 glibc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-linux-gnu-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get install -y protobuf-compiler \
            cmake make perl libcurl4-openssl-dev libssl-dev zlib1g-dev libsasl2-dev libzstd-dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build (native glibc, abi3 portable Python)
        env:
          PYO3_PYTHON: python3.12
          # Thin LTO: ~15 min vs ~50 min fat LTO, negligible runtime difference
          CARGO_PROFILE_RELEASE_LTO: thin
        run: cargo build --release -p sail-cli --target x86_64-unknown-linux-gnu
      - name: Rename binary
        run: cp target/x86_64-unknown-linux-gnu/release/vajra vajra-x86_64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: vajra-x86_64-unknown-linux-gnu
          path: vajra-x86_64-unknown-linux-gnu
          retention-days: 1

  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-aarch64-py312-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: brew install protobuf cmake python@3.12
      # Build against Homebrew python@3.12 — the exact interpreter install.sh
      # provisions on user machines, so the binary's absolute Python framework
      # link (/opt/homebrew/opt/python@3.12/...) resolves at runtime. With the
      # subprocess UDF model (VAJRA_PYTHON) the embedded Python is only a fallback.
      # NOTE: this is a NATIVE arm64 build, so PYO3_CROSS_PYTHON_VERSION (set at
      # workflow level for the Linux musl cross-build) must be cleared here or
      # PyO3 enters cross mode and links the wrong python3.11.
      - name: Build aarch64 (Apple Silicon)
        env:
          PYO3_PYTHON: /opt/homebrew/opt/python@3.12/bin/python3.12
          MACOSX_DEPLOYMENT_TARGET: "12.0"
          # Thin LTO: ~15 min vs ~50 min fat LTO, negligible runtime difference
          CARGO_PROFILE_RELEASE_LTO: thin
        run: cargo build --release -p sail-cli --target aarch64-apple-darwin
      - name: Rename binary
        run: cp target/aarch64-apple-darwin/release/vajra vajra-aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: vajra-aarch64-apple-darwin
          path: vajra-aarch64-apple-darwin
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    # Publish whatever binaries succeeded — macOS Apple Silicon is the primary
    # asset for install.sh; Linux musl is best-effort while the rdkafka static
    # cross-compile is finalized.
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vajra-*
          merge-multiple: true
          path: dist
      - name: Show release assets
        run: ls -lh dist/ || echo "no artifacts"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: ${{ github.event_name == 'workflow_dispatch' }}
