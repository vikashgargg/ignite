name: Release Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PYO3_CROSS_PYTHON_VERSION: "3.11"

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-musl
            asset_name: vajra-x86_64-unknown-linux-musl
          - arch: aarch64
            target: aarch64-unknown-linux-musl
            asset_name: vajra-aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-v2-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get install -y protobuf-compiler musl-tools \
            cmake make perl libcurl4-openssl-dev libssl-dev zlib1g-dev libsasl2-dev libzstd-dev
          pip install cargo-zigbuild 2>/dev/null || cargo install cargo-zigbuild
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.14.0"
      - name: Build
        run: cargo zigbuild --release -p sail-cli --target ${{ matrix.target }}
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/vajra ${{ matrix.asset_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-aarch64-py312-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: brew install protobuf cmake python@3.12
      # Build against Homebrew python@3.12 — the exact interpreter install.sh
      # provisions on user machines, so the binary's absolute Python framework
      # link (/opt/homebrew/opt/python@3.12/...) resolves at runtime. With the
      # subprocess UDF model (VAJRA_PYTHON) the embedded Python is only a fallback.
      - name: Build aarch64 (Apple Silicon)
        env:
          PYO3_PYTHON: /opt/homebrew/opt/python@3.12/bin/python3.12
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: cargo build --release -p sail-cli --target aarch64-apple-darwin
      - name: Rename binary
        run: cp target/aarch64-apple-darwin/release/vajra vajra-aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: vajra-aarch64-apple-darwin
          path: vajra-aarch64-apple-darwin
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    # Publish whatever binaries succeeded — macOS Apple Silicon is the primary
    # asset for install.sh; Linux musl is best-effort while the rdkafka static
    # cross-compile is finalized.
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vajra-*
          merge-multiple: true
          path: dist
      - name: Show release assets
        run: ls -lh dist/ || echo "no artifacts"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: ${{ github.event_name == 'workflow_dispatch' }}
