# Publish the Vajra container image to GHCR so anyone can `docker pull` and try it.
# Prod-grade pattern (per Docker docs / Vector / DataFusion): build each arch on its NATIVE runner,
# push by digest, merge into ONE multi-arch manifest, then scan (Trivy), sign (cosign keyless) and
# attach an SBOM (syft). Same arm64 image is what runs on EKS and Apple `container`.
name: Publish image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref_tag:
        description: "Extra image tag to publish (e.g. edge, rc1). 'latest'+sha are always added on non-tag runs."
        required: false
        default: "edge"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # e.g. vikashgargg/ignite

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, platform: linux/amd64, arch: amd64 }
          - { runner: ubuntu-24.04-arm, platform: linux/arm64, arch: arm64 }
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export.outputs.digest-arm64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push an untagged image identified only by digest; the merge job assembles the manifest.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: true
          sbom: true
      - name: Export digest
        id: export
        run: echo "digest-${{ matrix.arch }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  merge:
    name: Merge manifest + tag
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.ref.outputs.image-ref }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ github.event.inputs.ref_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=long
      - name: Create + push multi-arch manifest
        run: |
          set -euo pipefail
          IMG="${REGISTRY}/${IMAGE_NAME}"
          SRC="${IMG}@${{ needs.build.outputs.digest-amd64 }} ${IMG}@${{ needs.build.outputs.digest-arm64 }}"
          # docker/metadata-action emits one `--tag` line per tag in bake/annotations; build the args:
          TAGS=$(echo '${{ steps.meta.outputs.tags }}' | while read -r t; do [ -n "$t" ] && printf ' -t %s' "$t"; done)
          docker buildx imagetools create $TAGS $SRC
      - name: Resolve pushed image ref (by primary tag + digest)
        id: ref
        run: |
          set -euo pipefail
          PRIMARY=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          DIGEST=$(docker buildx imagetools inspect "$PRIMARY" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "image-ref=${REGISTRY}/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Published $PRIMARY -> $DIGEST"

  scan-sign:
    name: Scan + sign + SBOM
    needs: merge
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless (OIDC)
      security-events: write # upload Trivy SARIF
    steps:
      - name: Trivy vulnerability scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ needs.merge.outputs.image-ref }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless)
        run: cosign sign --yes "${{ needs.merge.outputs.image-ref }}"
      - name: Generate + attest SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.merge.outputs.image-ref }}
          format: spdx-json
          output-file: vajra.sbom.spdx.json
      - name: Attest SBOM with cosign
        run: cosign attest --yes --predicate vajra.sbom.spdx.json --type spdxjson "${{ needs.merge.outputs.image-ref }}"
