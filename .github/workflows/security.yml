name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/security.yml"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
  schedule:
    # Re-scan weekly so newly-published advisories against pinned deps surface
    # even without a code change.
    - cron: "0 6 * * 1"

jobs:
  supply-chain:
    name: cargo-deny (advisories + licenses + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  audit:
    name: cargo-audit (RUSTSEC CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
