syntax = "proto3";

package zelox.streaming;

message FlowMarker {
  oneof Kind {
    LatencyTracker latency_tracker = 1;
    Watermark watermark = 2;
    Checkpoint checkpoint = 3;
    EndOfData end_of_data = 4;
    Idle idle = 5;
  }
}

message LatencyTracker {
  string source = 1;
  uint64 id = 2;
  int64 timestamp_secs = 3;
  uint32 timestamp_nanos = 4;
}

message Watermark {
  string source = 1;
  int64 timestamp_secs = 2;
  uint32 timestamp_nanos = 3;
}

message Checkpoint {
  uint64 id = 1;
}

message EndOfData {}

// Emitted by a source instance when it is genuinely caught up (an empty poll: no data currently
// available for its assigned partition), so downstream N->M merges can EXCLUDE it from the watermark
// MIN (Flink WatermarkStatus.IDLE) without a wall-clock timeout — which at scale wrongly marks a
// slow-but-active (backpressured/unscheduled) source idle and closes windows early. A source that
// resumes delivering data/watermarks is implicitly active again.
message Idle {
  string source = 1;
}
