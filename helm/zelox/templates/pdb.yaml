{{- if and .Values.podDisruptionBudget.enabled (eq .Values.mode "kubernetes-cluster") }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "zelox.fullname" . }}-workers
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zelox.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "zelox.workerSelectorLabels" . | nindent 6 }}
{{- end }}
